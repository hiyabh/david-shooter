<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>חללית בחלל!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #ui {
      color: #fff;
      font-size: 22px;
      margin-bottom: 8px;
      margin-top: 16px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #0af;
    }
    canvas {
      border: 2px solid #0af;
      box-shadow: 0 0 30px #0af8;
      border-radius: 8px;
    }
    #info {
      color: #888;
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="ui">⭐ ניקוד: <span id="score">0</span> &nbsp;|&nbsp; חיים: <span id="lives">3</span> &nbsp;|&nbsp; 🚀 טילים: <span id="missiles">3</span></div>
  <canvas id="c" width="600" height="700"></canvas>
  <div id="info">חצים / WASD להזזה &nbsp;|&nbsp; רווח לירות &nbsp;|&nbsp; <b style="color:#f80">X</b> = טיל על-קולי!</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Load images
const imgDavid = new Image(); imgDavid.src = 'דוד.png';
const imgShira = new Image(); imgShira.src = 'שירה.png';

// Game phases: 'select' | 'playing' | 'gameover'
let phase = 'select';
let selectedChar = null; // {img, name, color}
let hoveredCard = null;

const characters = [
  { img: imgDavid, name: 'דוד',  color: '#0af', bulletColor: '#0ff', glowColor: '#0af' },
  { img: imgShira, name: 'שירה', color: '#f0a', bulletColor: '#f8f', glowColor: '#f0a' },
];

// Game state
let score = 0;
let lives = 3;
let gameOver = false;
let level = 1;
let lastMissileBonus = 0;

// Stars background
const bgStars = Array.from({length: 120}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.5 + 0.3,
  speed: Math.random() * 0.5 + 0.1,
  brightness: Math.random()
}));

// Player
const player = {
  x: W / 2, y: H - 110,
  w: 80, h: 80,
  speed: 5,
  shootCooldown: 0
};

let bullets = [];
let enemies = [];
let enemyTimer = 0;
let enemyInterval = 90;
let explosions = [];
let missiles = [];
let missileCount = 3;
let shockwave = null;

// Keys
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'KeyX' && phase === 'playing' && missileCount > 0) fireMissile();
  if (e.code === 'Digit1' && phase === 'select') startGame(0);
  if (e.code === 'Digit2' && phase === 'select') startGame(1);
  if (e.code === 'KeyR' && phase === 'gameover') resetGame();
});
window.addEventListener('keyup', e => keys[e.code] = false);

// Mouse for selection screen
canvas.addEventListener('mousemove', e => {
  if (phase !== 'select') return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  hoveredCard = null;
  characters.forEach((_, i) => {
    const cx = W / 2 - 120 + i * 240, cy = H / 2 + 20;
    if (mx > cx - 90 && mx < cx + 90 && my > cy - 120 && my < cy + 100) hoveredCard = i;
  });
});
canvas.addEventListener('click', e => {
  if (phase !== 'select') return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  characters.forEach((_, i) => {
    const cx = W / 2 - 120 + i * 240, cy = H / 2 + 20;
    if (mx > cx - 90 && mx < cx + 90 && my > cy - 120 && my < cy + 100) startGame(i);
  });
});

function startGame(charIndex) {
  selectedChar = characters[charIndex];
  phase = 'playing';
  resetGameState();
}

function resetGameState() {
  score = 0; lives = 3; level = 1; missileCount = 3; lastMissileBonus = 0;
  bullets = []; enemies = []; explosions = []; missiles = []; shockwave = null;
  player.x = W / 2; player.y = H - 110;
  enemyTimer = 0; enemyInterval = 90; gameOver = false;
  document.getElementById('score').textContent = '0';
  document.getElementById('lives').textContent = '❤️❤️❤️';
  document.getElementById('missiles').textContent = '3';
}

function resetGame() {
  phase = 'select';
  hoveredCard = null;
}

// ---- Game logic ----

function spawnEnemy() {
  const size = Math.random() * 30 + 20;
  enemies.push({
    x: Math.random() * (W - size * 2) + size,
    y: -size,
    r: size,
    speed: Math.random() * 1.5 + 0.8 + level * 0.2,
    angle: 0,
    spinSpeed: (Math.random() - 0.5) * 0.05,
    color: randomStarColor(),
    rays: Math.floor(Math.random() * 3) + 5
  });
}

function randomStarColor() {
  return ['#FFD700','#FFA500','#FF6347','#FFE066','#FFF4A3','#FFFDE7'][Math.floor(Math.random()*6)];
}

function createExplosion(x, y, color) {
  const particles = [];
  for (let i = 0; i < 22; i++) {
    const angle = (Math.PI * 2 * i) / 22 + Math.random() * 0.3;
    const spd = Math.random() * 4 + 1.5;
    particles.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, life: 1, decay: Math.random()*0.04+0.02, r: Math.random()*5+2, color });
  }
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 * i) / 8;
    particles.push({ x, y, vx: Math.cos(angle)*6, vy: Math.sin(angle)*6, life: 1, decay: 0.07, r: 2, color: '#fff' });
  }
  explosions.push({ particles, tx: x, ty: y, tlife: 1 });
}

function fireMissile() {
  missileCount--;
  document.getElementById('missiles').textContent = missileCount;
  missiles.push({ x: player.x, y: player.y - player.h / 2, speed: 14, trail: [] });
}

function triggerShockwave(x, y) {
  shockwave = { x, y, r: 0, maxR: Math.max(W, H) * 0.85, life: 1 };
  const gained = enemies.length * 10;
  enemies.forEach(e => createExplosion(e.x, e.y, e.color));
  enemies = [];
  score += gained;
  level = Math.floor(score / 100) + 1;
  document.getElementById('score').textContent = score;
  checkMissileBonus(gained);
}

function checkMissileBonus(gained) {
  const milestone = Math.floor(score / 200);
  if (milestone > lastMissileBonus) {
    lastMissileBonus = milestone;
    missileCount++;
    document.getElementById('missiles').textContent = missileCount;
    explosions.push({ particles: [], tx: W/2, ty: H/2 - 30, tlife: 2.0, bonusText: '🚀 +טיל!' });
  }
}

function update() {
  // Scroll bg stars always
  bgStars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  });

  if (phase !== 'playing' || gameOver) return;

  if ((keys['ArrowLeft']||keys['KeyA']) && player.x - player.w/2 > 0) player.x -= player.speed;
  if ((keys['ArrowRight']||keys['KeyD']) && player.x + player.w/2 < W) player.x += player.speed;
  if ((keys['ArrowUp']||keys['KeyW']) && player.y - player.h/2 > 0) player.y -= player.speed;
  if ((keys['ArrowDown']||keys['KeyS']) && player.y + player.h/2 < H) player.y += player.speed;

  if (keys['Space'] && player.shootCooldown <= 0) {
    const c = selectedChar.bulletColor;
    bullets.push({ x: player.x, y: player.y - player.h/2, w: 6, h: 18, speed: 10, color: c });
    player.shootCooldown = 12;
  }
  if (player.shootCooldown > 0) player.shootCooldown--;

  bullets = bullets.filter(b => b.y + b.h > 0);
  bullets.forEach(b => b.y -= b.speed);

  missiles.forEach(m => {
    m.trail.push({ x: m.x, y: m.y });
    if (m.trail.length > 18) m.trail.shift();
    m.y -= m.speed;
  });
  missiles = missiles.filter(m => {
    if (m.y < -10) { triggerShockwave(m.x, 0); return false; }
    return true;
  });

  if (shockwave) {
    shockwave.r += 28;
    shockwave.life = 1 - shockwave.r / shockwave.maxR;
    if (shockwave.r >= shockwave.maxR) shockwave = null;
  }

  enemyTimer++;
  if (enemyTimer >= enemyInterval) {
    spawnEnemy();
    enemyTimer = 0;
    enemyInterval = Math.max(30, 90 - level * 5);
  }

  enemies.forEach(e => { e.y += e.speed; e.angle += e.spinSpeed; });

  const hitBullets = new Set();
  const hitEnemies = new Set();
  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      if (hitBullets.has(bi) || hitEnemies.has(ei)) return;
      const dx = b.x - e.x, dy = b.y - e.y;
      if (Math.sqrt(dx*dx + dy*dy) < e.r) {
        createExplosion(e.x, e.y, e.color);
        score += 10;
        level = Math.floor(score / 100) + 1;
        hitBullets.add(bi);
        hitEnemies.add(ei);
        checkMissileBonus(10);
      }
    });
  });
  bullets = bullets.filter((_, i) => !hitBullets.has(i));
  enemies = enemies.filter((_, i) => !hitEnemies.has(i));

  enemies = enemies.filter(e => {
    if (e.y - e.r > H) return false;
    const dx = e.x - player.x, dy = e.y - player.y;
    if (Math.sqrt(dx*dx + dy*dy) < e.r + 28) {
      createExplosion(e.x, e.y, e.color);
      lives--;
      if (lives <= 0) { gameOver = true; phase = 'gameover'; }
      return false;
    }
    return true;
  });

  explosions.forEach(exp => {
    exp.tlife -= 0.03;
    exp.ty -= 1;
    exp.particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.96; p.vy *= 0.96;
      p.life -= p.decay;
    });
    exp.particles = exp.particles.filter(p => p.life > 0);
  });
  explosions = explosions.filter(exp => exp.particles.length > 0 || exp.tlife > 0);

  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
}

// ---- Drawing ----

function drawBgStars() {
  bgStars.forEach(s => {
    const alpha = 0.4 + 0.6 * Math.abs(Math.sin(Date.now() * 0.001 + s.brightness * 10));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });
}

function drawSpaceship(x, y, w, h, img, glowColor, thruster = true) {
  const hw = w / 2, hh = h / 2;
  ctx.save();
  ctx.translate(x, y);

  // Thruster flames
  if (thruster) {
    const t = Date.now();
    for (let i = -1; i <= 1; i += 2) {
      const flameH = 18 + Math.sin(t * 0.02 + i) * 6;
      const fx = i * hw * 0.38, fy = hh * 0.72;
      const fg = ctx.createLinearGradient(fx, fy, fx, fy + flameH);
      fg.addColorStop(0, glowColor);
      fg.addColorStop(0.5, '#f80');
      fg.addColorStop(1, 'transparent');
      ctx.fillStyle = fg;
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.ellipse(fx, fy + flameH / 2, 5, flameH / 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Ship body (metallic grey hull)
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 18;

  // Main hull
  ctx.beginPath();
  ctx.moveTo(0, -hh);           // nose (top center)
  ctx.lineTo(hw * 0.55, -hh * 0.1);  // upper right shoulder
  ctx.lineTo(hw * 0.6, hh * 0.55);   // lower right body
  ctx.lineTo(hw * 0.22, hh * 0.72);  // bottom right
  ctx.lineTo(-hw * 0.22, hh * 0.72); // bottom left
  ctx.lineTo(-hw * 0.6, hh * 0.55);  // lower left body
  ctx.lineTo(-hw * 0.55, -hh * 0.1); // upper left shoulder
  ctx.closePath();
  const hullGrad = ctx.createLinearGradient(-hw, -hh, hw, hh);
  hullGrad.addColorStop(0, '#3a4a6a');
  hullGrad.addColorStop(0.5, '#1e2a45');
  hullGrad.addColorStop(1, '#0d1520');
  ctx.fillStyle = hullGrad;
  ctx.fill();
  ctx.strokeStyle = glowColor + '99';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Left wing
  ctx.beginPath();
  ctx.moveTo(-hw * 0.55, -hh * 0.1);
  ctx.lineTo(-hw, hh * 0.3);
  ctx.lineTo(-hw * 0.85, hh * 0.7);
  ctx.lineTo(-hw * 0.6, hh * 0.55);
  ctx.closePath();
  const wingGradL = ctx.createLinearGradient(-hw, 0, -hw*0.5, 0);
  wingGradL.addColorStop(0, '#0d1a30');
  wingGradL.addColorStop(1, '#1e2a45');
  ctx.fillStyle = wingGradL;
  ctx.fill();
  ctx.strokeStyle = glowColor + '66';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Right wing (mirror)
  ctx.beginPath();
  ctx.moveTo(hw * 0.55, -hh * 0.1);
  ctx.lineTo(hw, hh * 0.3);
  ctx.lineTo(hw * 0.85, hh * 0.7);
  ctx.lineTo(hw * 0.6, hh * 0.55);
  ctx.closePath();
  const wingGradR = ctx.createLinearGradient(hw*0.5, 0, hw, 0);
  wingGradR.addColorStop(0, '#1e2a45');
  wingGradR.addColorStop(1, '#0d1a30');
  ctx.fillStyle = wingGradR;
  ctx.fill();
  ctx.strokeStyle = glowColor + '66';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Wing accent lines
  ctx.strokeStyle = glowColor + '55';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-hw*0.6, hh*0.1); ctx.lineTo(-hw*0.9, hh*0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hw*0.6, hh*0.1);  ctx.lineTo(hw*0.9, hh*0.5);  ctx.stroke();

  // Cockpit window (oval) with face inside
  const cockpitR = hw * 0.38;
  const cockpitY = -hh * 0.1;
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(0, cockpitY, cockpitR, cockpitR * 1.1, 0, 0, Math.PI * 2);
  ctx.clip();
  if (img && img.complete) {
    ctx.drawImage(img, -cockpitR, cockpitY - cockpitR * 1.1, cockpitR * 2, cockpitR * 2.2);
  }
  ctx.restore();

  // Cockpit rim
  ctx.beginPath();
  ctx.ellipse(0, cockpitY, cockpitR, cockpitR * 1.1, 0, 0, Math.PI * 2);
  ctx.strokeStyle = glowColor;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 12;
  ctx.stroke();

  // Nose tip glow
  ctx.beginPath();
  ctx.arc(0, -hh, 4, 0, Math.PI * 2);
  ctx.fillStyle = glowColor;
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 16;
  ctx.fill();

  // Engine pods (bottom)
  [-1, 1].forEach(side => {
    ctx.beginPath();
    ctx.ellipse(side * hw * 0.38, hh * 0.65, hw * 0.12, hw * 0.18, 0, 0, Math.PI * 2);
    const epg = ctx.createRadialGradient(side*hw*0.38, hh*0.65, 0, side*hw*0.38, hh*0.65, hw*0.18);
    epg.addColorStop(0, '#2a3a55');
    epg.addColorStop(1, '#0d1520');
    ctx.fillStyle = epg;
    ctx.strokeStyle = glowColor + '88';
    ctx.lineWidth = 1;
    ctx.fill();
    ctx.stroke();
  });

  ctx.restore();
}

function drawStar(x, y, outerR, innerR, rays, color, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  for (let i = 0; i < rays * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = (i * Math.PI) / rays;
    if (i === 0) ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 18;
  ctx.fill();
  ctx.strokeStyle = '#fff8';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

function drawSelectionScreen() {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);
  drawBgStars();

  // Title
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 42px Arial';
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 24;
  ctx.fillText('🚀 בחר את החללית שלך!', W/2, 120);
  ctx.font = '20px Arial';
  ctx.fillStyle = '#aaa';
  ctx.shadowBlur = 0;
  ctx.fillText('לחץ על דמות או הקש 1 / 2', W/2, 160);
  ctx.restore();

  characters.forEach((ch, i) => {
    const cx = W / 2 - 120 + i * 240;
    const cy = H / 2 + 20;
    const hovered = hoveredCard === i;

    // Card background
    ctx.save();
    ctx.beginPath();
    ctx.roundRect(cx - 90, cy - 120, 180, 220, 16);
    ctx.fillStyle = hovered ? `${ch.color}22` : '#0d1a2a';
    ctx.strokeStyle = hovered ? ch.color : ch.color + '55';
    ctx.lineWidth = hovered ? 2.5 : 1.5;
    ctx.shadowColor = ch.color;
    ctx.shadowBlur = hovered ? 20 : 6;
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    // Mini spaceship preview
    const previewScale = hovered ? 0.85 : 0.75;
    drawSpaceship(cx, cy - 20, 100 * previewScale, 110 * previewScale, ch.img, ch.color, false);

    // Name
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = `bold ${hovered ? 22 : 20}px Arial`;
    ctx.fillStyle = ch.color;
    ctx.shadowColor = ch.color;
    ctx.shadowBlur = hovered ? 12 : 4;
    ctx.fillText(ch.name, cx, cy + 90);
    ctx.font = '14px Arial';
    ctx.fillStyle = '#888';
    ctx.shadowBlur = 0;
    ctx.fillText(`לחץ ${i + 1}`, cx, cy + 112);
    ctx.restore();
  });
}

function drawGame() {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);
  drawBgStars();

  // Bullets
  bullets.forEach(b => {
    ctx.save();
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 12;
    const grad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    grad.addColorStop(0, b.color);
    grad.addColorStop(1, 'rgba(0,255,255,0.2)');
    ctx.fillStyle = grad;
    // manual rounded rect (no roundRect API needed)
    const bx = b.x - b.w/2, by = b.y, bw = b.w, bh = b.h, br = 3;
    ctx.beginPath();
    ctx.moveTo(bx + br, by);
    ctx.lineTo(bx + bw - br, by);
    ctx.arcTo(bx + bw, by, bx + bw, by + br, br);
    ctx.lineTo(bx + bw, by + bh - br);
    ctx.arcTo(bx + bw, by + bh, bx + bw - br, by + bh, br);
    ctx.lineTo(bx + br, by + bh);
    ctx.arcTo(bx, by + bh, bx, by + bh - br, br);
    ctx.lineTo(bx, by + br);
    ctx.arcTo(bx, by, bx + br, by, br);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  });

  // Missiles
  missiles.forEach(m => {
    m.trail.forEach((t, i) => {
      const alpha = (i / m.trail.length) * 0.7;
      const size = (i / m.trail.length) * 10;
      if (size < 0.5) return;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
      const tGrad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, size);
      tGrad.addColorStop(0, '#fff');
      tGrad.addColorStop(0.4, '#f80');
      tGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = tGrad;
      ctx.fill();
      ctx.restore();
    });
    ctx.save();
    ctx.shadowColor = '#f80';
    ctx.shadowBlur = 24;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(m.x, m.y, 7, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f80';
    ctx.beginPath();
    ctx.ellipse(m.x, m.y - 12, 5, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // Shockwave
  if (shockwave) {
    ctx.save();
    ctx.globalAlpha = shockwave.life * 0.25;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(shockwave.x, shockwave.y, shockwave.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,160,0,${shockwave.life * 0.9})`;
    ctx.lineWidth = 12 * shockwave.life;
    ctx.shadowColor = '#f80';
    ctx.shadowBlur = 30;
    ctx.stroke();
    if (shockwave.r > 30) {
      ctx.beginPath();
      ctx.arc(shockwave.x, shockwave.y, shockwave.r * 0.7, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,220,80,${shockwave.life * 0.5})`;
      ctx.lineWidth = 5 * shockwave.life;
      ctx.stroke();
    }
    ctx.restore();
  }

  // Enemy stars
  enemies.forEach(e => drawStar(e.x, e.y, e.r, e.r * 0.45, e.rays, e.color, e.angle));

  // Explosions
  explosions.forEach(exp => {
    exp.particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.restore();
    });
    if (exp.tlife > 0) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, exp.tlife);
      ctx.textAlign = 'center';
      if (exp.bonusText) {
        ctx.fillStyle = '#f80'; ctx.font = 'bold 28px Arial'; ctx.shadowColor = '#f80';
      } else {
        ctx.fillStyle = '#FFD700'; ctx.font = 'bold 20px Arial'; ctx.shadowColor = '#FFD700';
      }
      ctx.shadowBlur = 14;
      ctx.fillText(exp.bonusText || '+10', exp.tx, exp.ty);
      ctx.restore();
    }
  });

  // Player spaceship
  if (selectedChar) {
    drawSpaceship(player.x, player.y, player.w, player.h, selectedChar.img, selectedChar.color, true);
  }

  // HUD: Level
  ctx.save();
  ctx.fillStyle = '#0af4';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('שלב ' + level, 10, 20);
  ctx.restore();

  // HUD: Instructions
  ctx.save();
  ctx.textAlign = 'right';
  const instructions = [
    { label: '↑↓←→ / WASD', desc: 'תזוזה' },
    { label: 'רווח', desc: 'ירי' },
    { label: 'X', desc: 'טיל על-קולי' },
    { label: 'R', desc: 'חזרה לבחירה' },
  ];
  instructions.forEach((ins, i) => {
    const y = 22 + i * 22;
    ctx.font = 'bold 13px Arial';
    ctx.fillStyle = '#f80';
    ctx.shadowColor = '#f80';
    ctx.shadowBlur = 6;
    ctx.fillText(ins.label, W - 8, y);
    ctx.font = '12px Arial';
    ctx.fillStyle = '#aaa';
    ctx.shadowBlur = 0;
    ctx.fillText('= ' + ins.desc, W - 8 - ctx.measureText(ins.label).width - 4, y);
  });
  ctx.restore();

  // Game Over overlay
  if (phase === 'gameover') {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = 'bold 54px Arial';
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 30;
    ctx.fillText('המשחק נגמר!', W/2, H/2 - 50);
    ctx.font = '28px Arial';
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 0;
    ctx.fillText('ניקוד: ' + score, W/2, H/2 + 10);
    ctx.font = '20px Arial';
    ctx.fillStyle = selectedChar ? selectedChar.color : '#0af';
    ctx.fillText('לחץ R לבחירת דמות מחדש', W/2, H/2 + 60);
    ctx.restore();
  }
}

function loop() {
  requestAnimationFrame(loop); // always schedule next frame first
  update();
  if (phase === 'select') drawSelectionScreen();
  else drawGame();
}

// Wait for both images — ensure loop starts only once
let loaded = 0;
let started = false;
function onImgLoad() {
  loaded++;
  if (loaded >= 2 && !started) {
    started = true;
    loop();
  }
}
imgDavid.onload = onImgLoad;
imgShira.onload = onImgLoad;
if (imgDavid.complete) onImgLoad();
if (imgShira.complete) onImgLoad();
</script>
</body>
</html>
